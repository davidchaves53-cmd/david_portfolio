<div class="project tilt">
    <h3>Weekly Hours Calculator</h3>

    <div style="
        background:#0b0b12;
        padding:20px;
        border-radius:12px;
        border:1px solid #00eaff55;
        box-shadow:0 0 15px #00eaff33;
        color:#e0e0e0;
    ">

        <label>Monday Hours:</label>
        <input type="number" id="mon" step="0.01" placeholder="e.g. 8"
               style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Tuesday Hours:</label>
        <input type="number" id="tue" step="0.01" placeholder="e.g. 8"
               style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Wednesday Hours:</label>
        <input type="number" id="wed" step="0.01" placeholder="e.g. 8"
               style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Thursday Hours:</label>
        <input type="number" id="thu" step="0.01" placeholder="e.g. 8"
               style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Friday Hours:</label>
        <input type="number" id="fri" step="0.01" placeholder="e.g. 8"
               style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <button onclick="calculateHours()" style="
            background:#00eaff;
            color:#000;
            padding:10px 16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
        ">Calculate Total & Average</button>

        <p id="output" style="margin-top:15px;font-size:1.1em;color:#00eaff;white-space:pre-line;"></p>
    </div>
</div>
