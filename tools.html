<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Tools — David Chaves</title>

<style>
    :root {
        --bg: #050509;
        --card-bg: #0b0b12;
        --accent: #00ff88;
        --accent-soft: #00ff8855;
        --text-main: #e0e0e0;
        --text-muted: #9a9a9a;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #101020 0, #050509 45%, #000 100%);
        color: var(--text-main);
        overflow-x: hidden;
        min-height: 100vh;
        cursor: none;
    }

    #particles {
        position: fixed;
        inset: 0;
        z-index: -2;
    }

    .cursor-dot {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        pointer-events: none;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        z-index: 9999;
        opacity: 0.9;
        transform: translate(-50%, -50%);
    }

    header {
        text-align: center;
        padding: 60px 20px 20px;
        position: relative;
        z-index: 1;
    }

    h1 {
        font-size: 2.8rem;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    h2 {
        margin-top: 40px;
        border-left: 4px solid var(--accent);
        padding-left: 12px;
        font-size: 1.6rem;
    }

    .container {
        width: 90%;
        max-width: 1100px;
        margin: auto;
        padding-bottom: 80px;
        position: relative;
        z-index: 1;
    }

    .tool-card {
        background: linear-gradient(145deg, #07070c, #10101a);
        padding: 20px;
        border-radius: 14px;
        border: 1px solid var(--accent-soft);
        margin-bottom: 30px;
        box-shadow: 0 0 15px #00ff8822;
    }

    label {
        display: block;
        margin-top: 10px;
        margin-bottom: 4px;
        color: var(--text-main);
    }

    input {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: none;
        margin-bottom: 10px;
        background: #1a1a22;
        color: var(--text-main);
    }

    button {
        background: var(--accent);
        color: #000;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
        font-weight: bold;
        box-shadow: 0 0 12px #00ff8833;
    }

    p.output {
        margin-top: 15px;
        font-size: 1.1em;
        color: var(--accent);
        white-space: pre-line;
    }

    a { color: var(--accent); }

    footer {
        text-align: center;
        padding: 30px;
        color: var(--text-muted);
        font-size: 0.9rem;
        position: relative;
        z-index: 1;
    }

    .sound-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1000;
        background: #0b0b12cc;
        border-radius: 999px;
        padding: 6px 14px;
        border: 1px solid var(--accent-soft);
        color: var(--text-main);
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 0 12px #00ff8833;
    }

    .sound-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
    }

    .sound-toggle.muted .sound-indicator {
        background: #555;
        box-shadow: none;
    }

    @media (max-width: 600px) {
        body { cursor: auto; }
        .cursor-dot { display: none; }
    }
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="cursor-dot" id="cursorDot"></div>

<button class="sound-toggle" id="soundToggle">
    <span class="sound-indicator"></span>
    <span id="soundLabel">Sound: On</span>
</button>

<audio id="ambientAudio" loop>
    <source src="data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<audio id="hoverSound">
    <source src="data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<audio id="clickSound">
    <source src="data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" type="audio/mp3">
</audio>

<header>
    <h1>JavaScript Mini Tools</h1>
    <p>Created by David Chaves</p>
    <p><a href="index.html">← Back to Portfolio</a></p>
</header>

<div class="container">

    <h2>Pay / Hours / Income Calculator</h2>
    <div class="tool-card">
        <label>Pay per Hour ($):</label>
        <input type="number" id="pay" step="0.01">

        <label>Weekly Income ($):</label>
        <input type="number" id="income" step="0.01">

        <label>Hours Worked:</label>
        <input type="number" id="hours" step="0.01">

        <button onclick="calculate()">Calculate</button>
        <p id="output" class="output"></p>
    </div>

    <h2>Book Price Average Calculator</h2>
    <div class="tool-card">
        <p>Enter the price of three books:</p>

        <label>Book 1 Price:</label>
        <input type="number" id="book1" step="0.01">

        <label>Book 2 Price:</label>
        <input type="number" id="book2" step="0.01">

        <label>Book 3 Price:</label>
        <input type="number" id="book3" step="0.01">

        <button onclick="checkBookPrices()">Check Average Price</button>
        <p id="result" class="output"></p>
    </div>

    <h2>Weekly Hours Calculator</h2>
    <div class="tool-card">
        <label>Monday Hours:</label>
        <input type="number" id="mon" step="0.01">

        <label>Tuesday Hours:</label>
        <input type="number" id="tue" step="0.01">

        <label>Wednesday Hours:</label>
        <input type="number" id="wed" step="0.01">

        <label>Thursday Hours:</label>
        <input type="number" id="thu" step="0.01">

        <label>Friday Hours:</label>
        <input type="number" id="fri" step="0.01">

        <button onclick="calculateHours()">Calculate Total & Average</button>
        <p id="hoursOutput" class="output"></p>
    </div>

</div>

<footer>
    © 2026 David Chaves — JavaScript Tools
</footer>

<script>
function calculate() {
    const pay = parseFloat(document.getElementById("pay").value) || 0;
    const income = parseFloat(document.getElementById("income").value) || 0;
    const hours = parseFloat(document.getElementById("hours").value) || 0;

    let result = "";

    if (pay && hours) {
        result += `Weekly Income: $${(pay * hours).toFixed(2)}\n`;
    }
    if (income && pay) {
        result += `Hours Needed: ${(income / pay).toFixed(2)} hours\n`;
    }
    if (income && hours) {
        result += `Pay Rate Needed: $${(income / hours).toFixed(2)}/hr\n`;
    }

    document.getElementById("output").innerText =
        result || "Enter at least two values.";
}

function checkBookPrices() {
    const b1 = parseFloat(document.getElementById("book1").value) || 0;
    const b2 = parseFloat(document.getElementById("book2").value) || 0;
    const b3 = parseFloat(document.getElementById("book3").value) || 0;

    const avg = (b1 + b2 + b3) / 3;

    document.getElementById("result").innerText =
        `Average Price: $${avg.toFixed(2)}`;
}

function calculateHours() {
    const mon = parseFloat(document.getElementById("mon").value) || 0;
    const tue = parseFloat(document.getElementById("tue").value) || 0;
    const wed = parseFloat(document.getElementById("wed").value) || 0;
    const thu = parseFloat(document.getElementById("thu").value) || 0;
    const fri = parseFloat(document.getElementById("fri").value) || 0;

    const total = mon + tue + wed + thu + fri;
    const avg = total / 5;

    document.getElementById("hoursOutput").innerText =
        `Total Hours: ${total.toFixed(2)}\nAverage per Day: ${avg.toFixed(2)}`;
}

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let hexes = [];
const numParticles = 60;
const numHexes = 10;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function initParticles() {
    particles = [];
    for (let i = 0; i < numParticles; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            dx: (Math.random() - 0.5) * 0.4,
            dy: (Math.random() - 0.5) * 0.4,
            alpha: Math.random() * 0.6 + 0.2
        });
    }
}

function initHexes() {
    hexes = [];
    for (let i = 0; i < numHexes; i++) {
        hexes.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 40 + 30,
            dx: (Math.random() - 0.5) * 0.15,
            dy: (Math.random() - 0.5) * 0.15,
            alpha: Math.random() * 0.25 + 0.05
        });
    }
}

function drawHex(x, y, size, alpha) {
    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
        const angle = (Math.PI * 2 / sides) * i;
        const px = x + size * Math.cos(angle);
        const py = y + size * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(0, 255, 136, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
}

function drawScene() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    hexes.forEach(h => {
        drawHex(h.x, h.y, h.size, h.alpha);
        h.x += h.dx;
        h.y += h.dy;
        if (h.x < -100) h.x = canvas.width + 100;
        if (h.x > canvas.width + 100) h.x = -100;
        if (h.y < -100) h.y = canvas.height + 100;
        if (h.y > canvas.height + 100) h.y = -100;
    });

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 136, ${p.alpha})`;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(drawScene);
}

initParticles();
initHexes();
drawScene();

const cursorDot = document.getElementById('cursorDot');
const trail = [];
const maxTrail = 18;

window.addEventListener('mousemove', (e) => {
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top = e.clientY + 'px';

    trail.push({ x: e.clientX, y: e.clientY, alpha: 1 });
    if (trail.length > maxTrail) trail.shift();
});

function drawTrail() {
    const existing = document.querySelectorAll('.trail-dot');
    existing.forEach(el => el.remove());

    trail.forEach(p => {
        const dot = document.createElement('div');
        dot.className = 'trail-dot';
        dot.style.position = 'fixed';
        dot.style.width = '6px';
        dot.style.height = '6px';
        dot.style.borderRadius = '50%';
        dot.style.pointerEvents = 'none';
        dot.style.left = p.x + 'px';
        dot.style.top = p.y + 'px';
        dot.style.transform = 'translate(-50%, -50%)';
        dot.style.background = `rgba(0,255,136,${p.alpha})`;
        dot.style.boxShadow = `0 0 10px rgba(0,255,136,${p.alpha})`;
        dot.style.zIndex = 9998;
        document.body.appendChild(dot);
        p.alpha -= 0.06;
    });

    for (let i = trail.length - 1; i >= 0; i--) {
        if (trail[i].alpha <= 0) trail.splice(i, 1);
    }

    requestAnimationFrame(drawTrail);
}
drawTrail();

const ambientAudio = document.getElementById('ambientAudio');
const soundToggle = document.getElementById('soundToggle');
const soundLabel = document.getElementById('soundLabel');
const hoverSound = document.getElementById('hoverSound');
const clickSound = document.getElementById('clickSound');

ambientAudio.volume = 0.25;

function setMuted(muted) {
    if (muted) {
        ambientAudio.pause();
        soundToggle.classList.add('muted');
        soundLabel.textContent = 'Sound: Off';
    } else {
        ambientAudio.play().catch(() => {});
        soundToggle.classList.remove('muted');
        soundLabel.textContent = 'Sound: On';
    }
}

soundToggle.addEventListener('click', () => {
    const isMuted = soundToggle.classList.contains('muted');
    setMuted(!isMuted);
});

ambientAudio.play().catch(() => {
    window.addEventListener('click', function once() {
        ambientAudio.play().catch(() => {});
        window.removeEventListener('click', once);
    });
});

document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
        hoverSound.currentTime = 0;
        hoverSound.play().catch(() => {});
    });
    btn.addEventListener('click', () => {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
    });
});
</script>

</body>
</html>
