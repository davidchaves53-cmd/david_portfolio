<div class="project tilt">
    <h3>Pay / Hours / Income Calculator</h3>

    <div style="
        background:#0b0b12;
        padding:20px;
        border-radius:12px;
        border:1px solid #00eaff55;
        box-shadow:0 0 15px #00eaff33;
        color:#e0e0e0;
    ">

        <label>Pay per Hour ($):</label>
        <input type="number" id="pay" step="0.01" placeholder="e.g. 25" style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Weekly Income ($):</label>
        <input type="number" id="income" step="0.01" placeholder="e.g. 1000" style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <label>Hours Worked:</label>
        <input type="number" id="hours" step="0.01" placeholder="e.g. 40" style="width:100%;padding:8px;border-radius:6px;border:none;margin-bottom:10px;">

        <button onclick="calculate()" style="
            background:#00eaff;
            color:#000;
            padding:10px 16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
        ">Calculate</button>

        <p id="output" style="margin-top:15px;font-size:1.1em;color:#00eaff;"></p>
    </div>
</div>

<script>
